<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VOO 投資判断（リアルタイム）</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .price {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .status {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .action {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .comment {
      font-size: 16px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="card">
    <div id="price" class="price">価格読み込み中…</div>
    <div id="status" class="status"></div>
    <div id="action" class="action"></div>
    <div id="comment" class="comment"></div>
  </div>

  <script>
    // Google Sheets CSV URL（A列: VOO, B列: USD/JPY）
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTUPW7sTouH5HARIfJ13xLHN6xTVwoHQoThYJkfgP6a8wAx5HnmQ5wNfYBGuzXnCR3MRs9Gdy8A9-wP/pub?output=csv";

    fetch(sheetUrl)
      .then(res => res.text())
      .then(csv => {
        const rows = csv.trim().split("\n").map(r => r.split(","));

        const priceUSD = parseFloat(rows[0][0]);
        const usdToJpy  = parseFloat(rows[0][1]);

        if (isNaN(priceUSD) || isNaN(usdToJpy)) {
          throw new Error("データが取得できていません");
        }

        const priceJPY = priceUSD * usdToJpy;

        let status = "";
        let action = "";
        let comment = "";

        // 判定ライン（VOOの日本円価格用）
        if (priceJPY > 80000) {
          status  = "高い";
          action  = "様子見";
          comment = "やや割高な水準です";
        } else if (priceJPY > 65000) {
          status  = "普通";
          action  = "積立OK";
          comment = "平均的な価格帯です";
        } else {
          status  = "チャンス";
          action  = "買い検討";
          comment = "割安の可能性があります";
        }

        document.getElementById("price").innerText  = "現在価格: " + priceJPY.toLocaleString() + " 円";
        document.getElementById("status").innerText = status;
        document.getElementById("action").innerText = action;
        document.getElementById("comment").innerText = comment;
      })
      .catch(err => {
        document.getElementById("price").innerText  = "価格取得失敗";
        document.getElementById("status").innerText = "";
        document.getElementById("action").innerText = "";
        document.getElementById("comment").innerText = "再読み込みしてください";
        console.error(err);
      });
  </script>

</body>
</html>
