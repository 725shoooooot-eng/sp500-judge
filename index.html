<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>S&P500 投資判断（リアルタイム）</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .status {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .action {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .comment {
      font-size: 16px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="card">
    <div id="status" class="status">読み込み中…</div>
    <div id="action" class="action"></div>
    <div id="comment" class="comment"></div>
  </div>

  <script>
    // ↓ Google Sheets JSON の URL（あなたのシートID入り）
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1jk70V1xgiPJGWEU1k2X7cmbwEamGXkO4FrlGhv-VzzQ/gviz/tq?tqx=out:json";

    fetch(sheetUrl)
      .then(res => res.text())
      .then(text => {
        // Google Sheets の gviz JSON 形式から実際の JSON を取り出す
        const json = JSON.parse(text.substr(47).slice(0, -2));

        // 一番最初のセルの値を price とする
        // （A1に GOOGLEFINANCE で株価を入れている前提）
        const price = parseFloat(json.table.rows[0].c[0].v);

        let status = "";
        let action = "";
        let comment = "";

        // 👇 ここが判定ロジック
        if (price > 5500) {
          status  = "高い";
          action  = "様子見";
          comment = "やや割高な水準です";
        } else if (price > 5000) {
          status  = "普通";
          action  = "積立OK";
          comment = "平均的な価格帯です";
        } else {
          status  = "チャンス";
          action  = "検討OK";
          comment = "割安の可能性があります";
        }

        // HTML に反映
        document.getElementById("status").innerText  = status;
        document.getElementById("action").innerText  = action;
        document.getElementById("comment").innerText = comment;
      })
      .catch(err => {
        document.getElementById("status").innerText  = "取得失敗";
        document.getElementById("action").innerText  = "";
        document.getElementById("comment").innerText = "再読み込みしてください";
        console.error(err);
      });
  </script>
</body>
</html>
